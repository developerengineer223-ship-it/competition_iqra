<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA Competition - Data Analysis Tool</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 30px;
        }

        /* Tool Selection */
        .tool-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tool-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tool-btn.sales {
            background: #3498db;
            color: white;
        }

        .tool-btn.health {
            background: #e74c3c;
            color: white;
        }

        .tool-btn:hover, .tool-btn.active {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Filters Section */
        .filters-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: none;
        }

        .filters-section.active {
            display: block;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        /* Statistics Dashboard */
        .stats-section {
            margin-bottom: 30px;
            display: none;
        }

        .stats-section.active {
            display: block;
        }

        .stats-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: 700;
        }

        /* Search Section */
        .search-section {
            margin-bottom: 30px;
            display: none;
        }

        .search-section.active {
            display: block;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .search-results {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .search-results.hidden {
            display: none;
        }

        .result-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        /* Chart Section */
        .chart-section {
            margin-bottom: 30px;
            display: none;
        }

        .chart-section.active {
            display: block;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Recommendations */
        .recommendations-section {
            margin-bottom: 30px;
            display: none;
        }

        .recommendations-section.active {
            display: block;
        }

        .recommendation-card {
            background: #ecf0f1;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 5px solid #3498db;
        }

        .recommendation-card.warning {
            border-left-color: #e74c3c;
        }

        .recommendation-card.success {
            border-left-color: #27ae60;
        }

        .recommendation-card h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .recommendation-card p {
            color: #666;
            margin-bottom: 8px;
        }

        .recommendation-card .action {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block;
            font-weight: 600;
        }

        /* Export Section */
        .export-section {
            margin-bottom: 30px;
            display: none;
        }

        .export-section.active {
            display: block;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-export {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-export:hover {
            background: #229954;
        }

        /* Data Preview */
        .data-preview {
            margin-top: 20px;
            overflow-x: auto;
        }

        .data-preview table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .data-preview th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .data-preview td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .data-preview tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .tool-selector {
                flex-direction: column;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 IQRA Competition Tool</h1>
            <p>Intelligent Data Analysis & Recommendation Engine</p>
        </header>

        <div class="main-content">
            <div class="message" id="message"></div>

            <!-- Tool Selection -->
            <div class="tool-selector">
                <button class="tool-btn sales" onclick="selectTool('sales')">📊 Sales Tool</button>
                <button class="tool-btn health" onclick="selectTool('health')">⚕️ Health Tool</button>
            </div>

            <!-- Filters Section -->
            <div class="filters-section" id="filtersSection">
                <h2 class="stats-title">🔍 Apply Filters</h2>
                <div class="filters-grid" id="filtersGrid"></div>
                <div class="filter-buttons">
                    <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                    <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
                </div>
            </div>

            <!-- Statistics Dashboard -->
            <div class="stats-section" id="statsSection">
                <h2 class="stats-title">📈 Quick Stats</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <!-- Search Section -->
            <div class="search-section" id="searchSection">
                <h2 class="stats-title">🔎 Search Data</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Enter search term..." />
                    <button class="btn btn-primary" onclick="performSearch()">Search</button>
                </div>
                <div class="search-results hidden" id="searchResults"></div>
            </div>

            <!-- Chart Section -->
            <div class="chart-section" id="chartSection">
                <h2 class="stats-title">📊 Interactive Visualizations</h2>
                <div class="chart-controls">
                    <button class="btn btn-primary" onclick="generateChart('bar')">📊 Bar Chart</button>
                    <button class="btn btn-primary" onclick="generateChart('line')">📈 Line Chart</button>
                    <button class="btn btn-primary" onclick="generateChart('pie')">🥧 Pie Chart</button>
                </div>
                <div class="chart-container" id="chartContainer"></div>
            </div>

            <!-- Recommendations Section -->
            <div class="recommendations-section" id="recommendationsSection">
                <h2 class="stats-title">💡 AI Recommendations</h2>
                <div id="recommendationsContainer"></div>
            </div>

            <!-- Export Section -->
            <div class="export-section" id="exportSection">
                <h2 class="stats-title">📥 Export Data</h2>
                <div class="export-buttons">
                    <button class="btn-export" onclick="exportData('csv')">📄 Export as CSV</button>
                    <button class="btn-export" onclick="exportData('json')">📋 Export as JSON</button>
                </div>
            </div>

            <!-- Data Preview -->
            <div class="data-preview" id="dataPreview"></div>

            <!-- Loading Indicator -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading data...</p>
            </div>
        </div>
    </div>

    <script>
        let currentTool = null;
        let currentData = null;
        let currentFilters = {};

        // Show message
        function showMessage(text, type = 'success') {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type} show`;
            setTimeout(() => msgEl.classList.remove('show'), 3000);
        }

        // Show/Hide loading
        function setLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Select Tool
        function selectTool(tool) {
            currentTool = tool;
            currentFilters = {};
            
            // Update button states
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            setLoading(true);
            
            fetch('/api/tool_select', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tool_type: tool })
            })
            .then(r => r.json())
            .then(data => {
                currentData = data;
                updateUI();
                setLoading(false);
                showMessage(`${tool.toUpperCase()} Tool loaded successfully!`);
            })
            .catch(e => {
                setLoading(false);
                showMessage('Error loading tool: ' + e, 'error');
            });
        }

        // Update UI based on tool type
        function updateUI() {
            const sections = ['filtersSection', 'statsSection', 'searchSection', 'chartSection', 'recommendationsSection', 'exportSection'];
            sections.forEach(s => document.getElementById(s).classList.add('active'));

            buildFilters();
            displayStats();
            displayRecommendations();
            displayDataPreview();
        }

        // Build dynamic filters
        function buildFilters() {
            const grid = document.getElementById('filtersGrid');
            grid.innerHTML = '';

            if (currentTool === 'sales') {
                grid.innerHTML = `
                    <div class="filter-group">
                        <label>Category</label>
                        <select id="categoryFilter" onchange="currentFilters.category = this.value">
                            <option value="">All Categories</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Food">Food</option>
                            <option value="Home">Home</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Start Date</label>
                        <input type="date" id="startDate" onchange="currentFilters.start_date = this.value" />
                    </div>
                    <div class="filter-group">
                        <label>End Date</label>
                        <input type="date" id="endDate" onchange="currentFilters.end_date = this.value" />
                    </div>
                `;
            } else if (currentTool === 'health') {
                grid.innerHTML = `
                    <div class="filter-group">
                        <label>Age Group</label>
                        <select id="ageGroupFilter" onchange="currentFilters.age_group = this.value">
                            <option value="">All Ages</option>
                            <option value="0-18">0-18 years</option>
                            <option value="19-35">19-35 years</option>
                            <option value="36-60">36-60 years</option>
                            <option value="60+">60+ years</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Condition</label>
                        <select id="conditionFilter" onchange="currentFilters.condition = this.value">
                            <option value="">All Conditions</option>
                            <option value="Diabetes">Diabetes</option>
                            <option value="Heart Disease">Heart Disease</option>
                            <option value="Hypertension">Hypertension</option>
                            <option value="Normal">Normal</option>
                        </select>
                    </div>
                `;
            }
        }

        // Apply Filters
        function applyFilters() {
            setLoading(true);

            fetch('/api/filter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tool_type: currentTool,
                    filters: currentFilters
                })
            })
            .then(r => r.json())
            .then(data => {
                currentData = data;
                displayStats();
                displayRecommendations();
                displayDataPreview();
                setLoading(false);
                showMessage(`Filters applied! Found ${data.record_count} records.`);
            })
            .catch(e => {
                setLoading(false);
                showMessage('Error applying filters: ' + e, 'error');
            });
        }

        // Reset Filters
        function resetFilters() {
            currentFilters = {};
            document.querySelectorAll('select, input[type="date"]').forEach(el => el.value = '');
            applyFilters();
        }

        // Display Statistics
        function displayStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';

            const stats = currentData.stats || {};
            for (const [key, value] of Object.entries(stats)) {
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
                    <div class="label">${key.replace(/_/g, ' ').toUpperCase()}</div>
                    <div class="value">${value}</div>
                `;
                statsGrid.appendChild(card);
            }
        }

        // Display Recommendations
        function displayRecommendations() {
            const container = document.getElementById('recommendationsContainer');
            container.innerHTML = '';

            const recs = currentData.recommendations || [];
            recs.forEach((rec, idx) => {
                const card = document.createElement('div');
                card.className = `recommendation-card ${idx % 2 === 0 ? 'success' : 'warning'}`;
                card.innerHTML = `
                    <h3>${rec.title}</h3>
                    <p>${rec.description}</p>
                    <div class="action">💼 ${rec.action}</div>
                `;
                container.appendChild(card);
            });
        }

        // Display Data Preview
        function displayDataPreview() {
            const preview = document.getElementById('dataPreview');
            const records = currentData.data_preview || [];

            if (records.length === 0) {
                preview.innerHTML = '<p>No data available</p>';
                return;
            }

            let table = '<table><thead><tr>';
            Object.keys(records[0]).forEach(key => {
                table += `<th>${key}</th>`;
            });
            table += '</tr></thead><tbody>';

            records.forEach(record => {
                table += '<tr>';
                Object.values(record).forEach(val => {
                    table += `<td>${val}</td>`;
                });
                table += '</tr>';
            });
            table += '</tbody></table>';

            preview.innerHTML = table;
        }

        // Search
        function performSearch() {
            const searchTerm = document.getElementById('searchInput').value;
            
            if (!searchTerm) {
                showMessage('Please enter a search term', 'error');
                return;
            }

            fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tool_type: currentTool,
                    search_term: searchTerm
                })
            })
            .then(r => r.json())
            .then(data => {
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.classList.remove('hidden');
                resultsDiv.innerHTML = '';

                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<p>No results found</p>';
                    return;
                }

                data.results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                    resultsDiv.appendChild(item);
                });

                showMessage(`Found ${data.count} matching records`);
            })
            .catch(e => showMessage('Search error: ' + e, 'error'));
        }

        // Generate Chart
        function generateChart(chartType) {
            setLoading(true);

            fetch('/api/chart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tool_type: currentTool,
                    chart_type: chartType
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('chartContainer').innerHTML = data.chart;
                setLoading(false);
                showMessage('Chart generated successfully!');
            })
            .catch(e => {
                setLoading(false);
                showMessage('Error generating chart: ' + e, 'error');
            });
        }

        // Export Data
        function exportData(format) {
            fetch('/api/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tool_type: currentTool,
                    format: format,
                    filters: currentFilters
                })
            })
            .then(r => r.json())
            .then(data => {
                const element = document.createElement('a');
                const file = new Blob([data.data], { type: 'text/plain' });
                element.href = URL.createObjectURL(file);
                element.download = data.filename;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                showMessage(`Data exported as ${format.toUpperCase()}`);
            })
            .catch(e => showMessage('Export error: ' + e, 'error'));
        }

        // Initialize
        window.addEventListener('load', () => {
            showMessage('👋 Welcome! Select a tool to get started', 'success');
        });
    </script>
</body>
</html>
